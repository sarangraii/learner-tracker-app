version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: learner_track_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: learner_track_db
    ports:
      - '5432:5432'
    volumes:
      - learner_track_pgdata:/var/lib/postgresql/data

volumes:
  learner_track_pgdata:
